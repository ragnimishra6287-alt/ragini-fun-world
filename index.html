<!DOCTYPE html>
<html>
<head>
    <title>Fun Zone Pro 🎮</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            transition: 0.5s;
            background: #fbc2eb;
        }

        .dark {
            background: #0f172a;
            color: white;
        }

        button {
            padding: 10px 20px;
            margin: 8px;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #score {
            font-size: 22px;
            margin-top: 10px;
        }
    </style>

    <script>
        // 🎨 Color change
        function changeColor() {
            document.body.style.background =
                "#" + Math.floor(Math.random()*16777215).toString(16);
        }

        // 🌙 Dark mode
        function toggleMode() {
            document.body.classList.toggle("dark");
        }

        // 🎮 Score Game
        let score = 0;
        function increaseScore() {
            score++;
            document.getElementById("score").innerText = "Score: " + score;
        }

        // 😂 Joke
        function showJoke() {
            let jokes = [
                "Coding is fun 😄",
                "Debugging = Detective work 😂",
                "Eat Sleep Code Repeat 😎"
            ];
            document.getElementById("joke").innerText =
                jokes[Math.floor(Math.random()*jokes.length)];
        }

        // 🎮 Guess Game
        let number = Math.floor(Math.random()*10)+1;
        function guessGame() {
            let guess = prompt("Guess number (1-10)");
            if (guess == number) {
                alert("🎉 Correct!");
            } else {
                alert("Try again 😅");
            }
        }

        // 🧠 Quiz
        function quiz() {
            let ans = prompt("HTML stands for?");
            if (ans.toLowerCase().includes("hypertext")) {
                alert("✅ Correct!");
            } else {
                alert("❌ Wrong!");
            }
        }

        // 🎵 Music
        function toggleMusic() {
            let m = document.getElementById("Music.mp3");
            if (m.paused) m.play();
            else m.pause();
        }
    </script>

</head>

<body>

    <h1>Fun Zone Pro 🎮😄</h1>

    <button onclick="changeColor()">Color 🎨</button>
    <button onclick="toggleMode()">Dark Mode 🌙</button>
    <button onclick="showJoke()">Joke 😂</button>
    <button onclick="guessGame()">Guess Game 🎮</button>
    <button onclick="quiz()">Quiz 🧠</button>
    <button onclick="toggleMusic()">Music 🎵</button>

    <h2 onclick="increaseScore()">Click Me 🎯</h2>
    <div id="score">Score: 0</div>

    <div id="joke"></div>

    <audio id="music" src="music.mp3" loop></audio>

</body>
</html>
